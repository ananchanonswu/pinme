<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PinMe - ค้นหาสถานที่ใกล้เคียง โรงแรม ร้านอาหาร สนามกีฬา สถานที่ท่องเที่ยว" />
  <title>PinMe - สแกนสถานที่ใกล้เคียง</title>

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient"></div>

  <!-- Main Container -->
  <main class="relative z-10 min-h-screen flex flex-col items-center px-4 py-8 sm:py-12">

    <!-- ===================== HEADER ===================== -->
    <header class="w-full max-w-md text-center mb-8">
      <div class="flex items-center justify-center gap-3 mb-3">
        <div class="logo-icon">📍</div>
        <h1 class="text-3xl font-extrabold tracking-tight">
          Pin<span class="text-teal-400">Me</span>
        </h1>
      </div>
      <p class="text-sm text-slate-400">ค้นหาสถานที่รอบตัวคุณ</p>
    </header>

    <!-- ===================== SEARCH FORM ===================== -->
    <section class="glass-card w-full max-w-md p-6 sm:p-7 mb-6">
      <form id="searchForm" autocomplete="off">

        <!-- Section: Coordinates -->
        <div class="mb-5">
          <div class="flex items-center justify-between mb-3">
            <label class="form-label mb-0">📌 พิกัดตำแหน่ง</label>
            <button type="button" id="gpsBtn" class="gps-btn">
              <span class="gps-icon">🎯</span>
              <span class="gps-text">ใช้ตำแหน่งปัจจุบัน</span>
            </button>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <input
                type="number"
                id="latitude"
                class="form-input"
                placeholder="Latitude"
                step="any"
                min="-90"
                max="90"
                required
              />
            </div>
            <div>
              <input
                type="number"
                id="longitude"
                class="form-input"
                placeholder="Longitude"
                step="any"
                min="-180"
                max="180"
                required
              />
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Section: Radius -->
        <div class="mb-5">
          <label class="form-label">📏 รัศมีการค้นหา</label>
          <div class="radius-chips">
            <button type="button" class="radius-chip" data-value="1">1 กม.</button>
            <button type="button" class="radius-chip active" data-value="3">3 กม.</button>
            <button type="button" class="radius-chip" data-value="5">5 กม.</button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Section: Category -->
        <div class="mb-6">
          <label class="form-label">🏷️ หมวดหมู่</label>
          <div class="category-pills">
            <button type="button" class="category-pill active" data-value="all">🌐 ทั้งหมด</button>
            <button type="button" class="category-pill" data-value="hotel">🏨 โรงแรม</button>
            <button type="button" class="category-pill" data-value="restaurant">🍽️ ร้านอาหาร</button>
            <button type="button" class="category-pill" data-value="sport">⚽ สนามกีฬา</button>
            <button type="button" class="category-pill" data-value="tourist">🏛️ ท่องเที่ยว</button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="submit-btn">
          <span id="submitBtnText">🔍 สแกนสถานที่</span>
          <span id="submitSpinner" class="spinner" style="display:none; width:1.3rem; height:1.3rem; border-width:2px; margin:0 auto;"></span>
        </button>
      </form>
    </section>

    <!-- ===================== RESULTS ===================== -->
    <section id="resultsContainer" class="results-container w-full max-w-md">

      <!-- Results Header -->
      <div class="flex items-center justify-between mb-4 px-1">
        <h2 class="text-lg font-bold">📋 ผลลัพธ์</h2>
        <span id="resultsCount" class="text-sm text-slate-400">0 สถานที่</span>
      </div>

      <!-- Loading Skeleton -->
      <div id="loadingState" style="display:none;" class="flex flex-col items-center gap-4 py-10">
        <div class="spinner"></div>
        <p class="text-sm text-slate-400">กำลังค้นหาสถานที่...</p>
      </div>

      <!-- Empty State -->
      <div id="emptyState" style="display:none;" class="flex flex-col items-center gap-3 py-12 text-center">
        <div class="text-5xl mb-1">🗺️</div>
        <p class="empty-title text-base font-semibold text-slate-300">ไม่พบสถานที่</p>
        <p class="empty-desc text-sm text-slate-500">ลองเปลี่ยนรัศมีหรือหมวดหมู่แล้วค้นหาอีกครั้ง</p>
      </div>

      <!-- Results Grid -->
      <div id="resultsGrid" class="flex flex-col gap-3"></div>
    </section>

    <!-- ===================== FOOTER ===================== -->
    <footer class="mt-auto pt-10 pb-4 text-center">
      <p class="text-xs text-slate-600">
        © 2026 PinMe — Location Scanner
      </p>
    </footer>

  </main>

  <!-- App Script -->
  <script src="js/app.js"></script>
</body>
</html>
